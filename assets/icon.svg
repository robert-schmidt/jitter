<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="8" result="shadow"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.3"/>
      <feComposite in2="shadow" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="40" y="40" width="944" height="944" rx="200" ry="200" fill="url(#bg)"/>
  <!-- Green dot with glow -->
  <circle cx="512" cy="480" r="180" fill="url(#glow)" filter="url(#shadow)"/>
  <!-- Pulse rings -->
  <circle cx="512" cy="480" r="240" fill="none" stroke="#4ade80" stroke-width="6" opacity="0.4"/>
  <circle cx="512" cy="480" r="310" fill="none" stroke="#4ade80" stroke-width="4" opacity="0.2"/>
  <!-- Text "jitter" -->
  <text x="512" y="760" text-anchor="middle" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="120" font-weight="600" fill="#e2e8f0" letter-spacing="8">jitter</text>
</svg>
